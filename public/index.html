<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>趣味答题挑战</title>
<script src="/socket.io/socket.io.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
}

.container { width: 100%; max-width: 900px; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; color: rgba(255,255,255,0.8); font-size: 14px; gap: 12px;
}

.progress-wrap {
  flex: 1; height: 6px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden;
}

.progress-bar {
  height: 100%; background: linear-gradient(90deg, #f7971e, #ffd200); border-radius: 3px; transition: width 0.4s ease;
}

.card {
  background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 32px 28px; transition: all 0.3s ease;
}

.question-num { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 12px; letter-spacing: 1px; }

.question-text {
  font-size: 20px; color: #fff; line-height: 1.7; margin-bottom: 28px; font-weight: 500;
}

.input-wrap { display: flex; gap: 10px; margin-bottom: 16px; }

.answer-input {
  flex: 1; padding: 14px 18px; font-size: 16px; border: 2px solid rgba(255,255,255,0.15); border-radius: 12px;
  background: rgba(255,255,255,0.08); color: #fff; outline: none; transition: all 0.25s;
}

.answer-input:focus { border-color: #ffd200; background: rgba(255,210,0,0.06); }
.answer-input.correct-input { border-color: rgba(76,217,100,0.6); background: rgba(76,217,100,0.1); }
.answer-input.wrong-input { border-color: rgba(255,69,58,0.5); background: rgba(255,69,58,0.08); }

.btn-submit {
  padding: 14px 24px; font-size: 16px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer;
  background: linear-gradient(135deg, #f7971e, #ffd200); color: #1a1a2e; transition: all 0.25s; white-space: nowrap;
}

.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(247,151,30,0.4); }
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

.feedback {
  padding: 14px 18px; border-radius: 12px; font-size: 15px; display: none; margin-bottom: 16px; animation: fadeIn 0.3s ease;
}

.feedback.show { display: block; }
.feedback.correct-msg { background: rgba(76,217,100,0.15); color: #4cd964; border: 1px solid rgba(76,217,100,0.3); }
.feedback.wrong-msg { background: rgba(255,69,58,0.15); color: #ff453a; border: 1px solid rgba(255,69,58,0.3); }
.feedback .correct-answer { color: #ffd200; font-weight: 600; margin-top: 4px; }

.btn {
  padding: 14px 28px; font-size: 16px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; transition: all 0.25s; white-space: nowrap;
}

.btn-next {
  background: linear-gradient(135deg, #f7971e, #ffd200); color: #1a1a2e; width: 100%;
}

.btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(247,151,30,0.4); }
.btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-restart {
  background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 16px 40px; font-size: 17px;
}

.btn-restart:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(102,126,234,0.5); }

/* ===== 结果?===== */
.result-card { text-align: center; }

.score-circle {
  width: 140px; height: 140px; border-radius: 50%;
  background: conic-gradient(#ffd200 var(--percent), rgba(255,255,255,0.1) var(--percent));
  display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; position: relative;
}

.score-circle::before {
  content: ''; width: 110px; height: 110px; border-radius: 50%; background: #1a1a3e; position: absolute;
}

.score-num { font-size: 36px; font-weight: 700; color: #ffd200; z-index: 1; }
.score-label { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 8px; }

.result-stats {
  display: flex; justify-content: center; gap: 32px; margin: 20px 0 28px;
}

.stat { text-align: center; }
.stat-val { font-size: 28px; font-weight: 700; color: #fff; }
.stat-val.green { color: #4cd964; }
.stat-val.red { color: #ff453a; }
.stat-val.rate { color: #ffd200; }
.stat-lbl { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px; }

.hint { text-align: center; color: rgba(255,255,255,0.35); font-size: 13px; margin-top: 16px; }

/* ===== 选择界面 ===== */
.select-card { text-align: center; }
.select-card .logo { font-size: 48px; margin-bottom: 8px; }
.select-card .title { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.select-card .subtitle { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 32px; }

.total-info {
  font-size: 14px; color: rgba(255,255,255,0.45); margin-bottom: 24px;
  padding: 12px 20px; background: rgba(255,255,255,0.05); border-radius: 10px; display: inline-block;
}

.total-info strong { color: #ffd200; }

.option-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }

.btn-option {
  padding: 18px 12px; font-size: 17px; font-weight: 600; border: 2px solid rgba(255,255,255,0.15); border-radius: 14px;
  background: rgba(255,255,255,0.06); color: #fff; cursor: pointer; transition: all 0.25s;
}

.btn-option:hover {
  border-color: #ffd200; background: rgba(255,210,0,0.1); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,210,0,0.2);
}

.btn-option.all-btn { grid-column: 2 / 3; }
.btn-option .count-num { display: block; font-size: 26px; color: #ffd200; margin-bottom: 2px; }
.btn-option .count-label { font-size: 12px; color: rgba(255,255,255,0.5); }

/* ===== 模式选择 ===== */
.mode-grid {
  display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; max-width: 400px; margin-left: auto; margin-right: auto;
}

.btn-mode {
  padding: 22px 20px; font-size: 18px; font-weight: 600; border: 2px solid rgba(255,255,255,0.15); border-radius: 14px;
  background: rgba(255,255,255,0.06); color: #fff; cursor: pointer; transition: all 0.25s;
  display: flex; align-items: center; gap: 14px; text-align: left;
}

.btn-mode:hover {
  border-color: #ffd200; background: rgba(255,210,0,0.1); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,210,0,0.2);
}

.btn-mode .mode-icon { font-size: 32px; flex-shrink: 0; }
.btn-mode .mode-info { flex: 1; }
.btn-mode .mode-name { font-size: 17px; margin-bottom: 3px; }
.btn-mode .mode-desc { font-size: 12px; color: rgba(255,255,255,0.45); }

/* ===== 对战布局 ===== */
.battle-layout { display: flex; gap: 16px; align-items: flex-start; }
.battle-main { flex: 1; min-width: 0; }
.battle-sidebar { width: 220px; flex-shrink: 0; }

.player-list-card {
  background: rgba(255,255,255,0.06); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 16px; margin-bottom: 12px;
}

.player-list-card .pl-title {
  font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.player-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; font-size: 13px; color: rgba(255,255,255,0.8);
}

.player-item.me { background: rgba(255,210,0,0.08); }
.player-item .pi-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.player-item .pi-score { font-weight: 700; color: #ffd200; margin-left: 8px; }
.player-item .pi-badge {
  font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; flex-shrink: 0;
}

.pi-badge.host { background: rgba(255,210,0,0.2); color: #ffd200; }
.pi-badge.answered { background: rgba(76,217,100,0.15); color: #4cd964; }
.pi-badge.waiting { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); }

.round-status {
  padding: 10px; text-align: center; font-size: 12px; color: rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.04); border-radius: 8px; margin-top: 10px;
}

/* ===== 本轮结果?===== */
.round-result-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; border-radius: 8px; margin-bottom: 4px;
  font-size: 13px; background: rgba(255,255,255,0.03);
}

.round-result-item .rri-rank { width: 24px; font-weight: 700; color: #ffd200; }
.round-result-item .rri-name { flex: 1; color: rgba(255,255,255,0.8); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.round-result-item .rri-answer { color: rgba(255,255,255,0.5); margin-right: 12px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.round-result-item .rri-result { font-weight: 600; padding: 2px 8px; border-radius: 4px; font-size: 12px; }

.rri-result.correct { color: #4cd964; background: rgba(76,217,100,0.1); }
.rri-result.wrong { color: #ff453a; background: rgba(255,69,58,0.1); }

/* ===== 最终排===== */
.rank-table {
  width: 100%; border-collapse: collapse; margin: 20px 0;
}

.rank-table th {
  color: rgba(255,255,255,0.4); font-size: 12px; text-align: left;
  padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.08);
}

.rank-table td {
  padding: 10px 12px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
}

.rank-table .rank-num { font-weight: 700; width: 40px; }
.rank-table .rank-1 { color: #ffd200; }
.rank-table .rank-2 { color: #c0c0c0; }
.rank-table .rank-3 { color: #cd7f32; }

.rank-table tr.me-row { background: rgba(255,210,0,0.06); }

/* ===== 房间等待 ===== */
.room-code-display {
  font-size: 48px; font-weight: 700; color: #ffd200; letter-spacing: 8px; margin: 16px 0; font-family: 'Courier New', monospace;
}

.room-input {
  width: 100%; max-width: 280px; padding: 16px 20px; font-size: 22px; text-align: center; letter-spacing: 6px;
  border: 2px solid rgba(255,255,255,0.15); border-radius: 14px;
  background: rgba(255,255,255,0.08); color: #fff; outline: none;
  font-family: 'Courier New', monospace; margin-bottom: 16px;
}

.room-input:focus { border-color: #ffd200; background: rgba(255,210,0,0.06); }

/* ===== 昵称弹窗 ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center; z-index: 9999; animation: fadeIn 0.2s ease;
}

.modal-box {
  background: linear-gradient(135deg, #1a1a3e, #2d2b55);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 18px;
  padding: 32px 28px; width: 360px; max-width: 90vw; text-align: center;
}

.modal-box .modal-title { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.modal-box .modal-sub { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 20px; }

.modal-input {
  width: 100%; padding: 14px 18px; font-size: 16px; border: 2px solid rgba(255,255,255,0.15); border-radius: 12px;
  background: rgba(255,255,255,0.08); color: #fff; outline: none; text-align: center; margin-bottom: 20px;
}

.modal-input:focus { border-color: #ffd200; }

.modal-btn {
  width: 100%; padding: 14px; font-size: 16px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer;
  background: linear-gradient(135deg, #f7971e, #ffd200); color: #1a1a2e; transition: all 0.25s;
}

.modal-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(247,151,30,0.4); }

.waiting-dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }

@keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.pulse { animation: pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

/* ===== 1v1 对决专用 ===== */
.duel-wins-display {
  display: flex; align-items: center; justify-content: center; gap: 20px;
  margin-bottom: 24px; padding: 16px; background: rgba(255,255,255,0.04); border-radius: 14px;
}

.duel-wins-player { text-align: center; flex: 1; }
.duel-wins-player .dw-name { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
.duel-wins-player .dw-score { font-size: 36px; font-weight: 700; color: #ffd200; }
.duel-wins-vs { font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.3); }
.duel-wins-player.me .dw-name { color: #ffd200; }

.duel-timer { text-align: center; margin-bottom: 16px; }
.duel-timer-circle {
  display: inline-flex; align-items: center; justify-content: center;
  width: 56px; height: 56px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.2);
  font-size: 22px; font-weight: 700; color: #fff; transition: border-color 0.3s, color 0.3s;
}

.duel-timer-circle.urgent { border-color: #ff453a; color: #ff453a; animation: pulse 0.5s ease infinite; }

.duel-ready-status {
  display: flex; justify-content: center; gap: 24px; margin: 20px 0;
}

.duel-ready-player {
  text-align: center; padding: 12px 24px; border-radius: 12px;
  background: rgba(255,255,255,0.05); min-width: 100px;
}

.duel-ready-player .dr-name { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
.duel-ready-player .dr-status { font-size: 13px; font-weight: 600; }
.duel-ready-player .dr-status.ready { color: #4cd964; }
.duel-ready-player .dr-status.not-ready { color: rgba(255,255,255,0.3); }

.btn-ready {
  padding: 14px 36px; font-size: 17px; font-weight: 700; border: none;
  border-radius: 14px; cursor: pointer; transition: all 0.25s; margin: 8px;
}

.btn-ready.ready-btn { background: linear-gradient(135deg, #4cd964, #30b350); color: #fff; }
.btn-ready.ready-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(76,217,100,0.4); }
.btn-ready.unready-btn { background: linear-gradient(135deg, #ff9500, #ff6b00); color: #fff; }
.btn-ready.unready-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,149,0,0.4); }
.btn-ready:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

/* 倒计时叠加层 */
.countdown-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  display: flex; align-items: center; justify-content: center; z-index: 10000; animation: fadeIn 0.2s ease;
}

.countdown-number {
  font-size: 100px; font-weight: 900; color: #ffd200; animation: countPulse 0.8s ease;
}

@keyframes countPulse {
  0% { transform: scale(1.5); opacity: 0; }
  50% { transform: scale(1); opacity: 1; }
  100% { transform: scale(0.8); opacity: 0.8; }
}

.first-wrong-notice {
  padding: 12px 16px; border-radius: 10px; margin-bottom: 14px;
  background: rgba(255,149,0,0.12); border: 1px solid rgba(255,149,0,0.3);
  color: #ff9500; font-size: 14px; text-align: center;
}

.duel-result-void {
  color: rgba(255,255,255,0.5); font-size: 14px; text-align: center; padding: 8px; margin: 8px 0;
}

/* ===== 移动?===== */
@media (max-width: 600px) {
  .battle-layout { flex-direction: column-reverse; }
  .battle-sidebar { width: 100%; }
  .card { padding: 24px 18px; }
  .question-text { font-size: 17px; }
  .input-wrap { flex-direction: column; }
  .result-stats { gap: 20px; }
  .option-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .btn-option.all-btn { grid-column: auto; }
  .btn-option { padding: 14px 10px; }
  .room-code-display { font-size: 36px; letter-spacing: 4px; }
  .modal-box { padding: 24px 18px; }
  .duel-wins-display { gap: 10px; }
  .duel-wins-player .dw-score { font-size: 28px; }
}
</style>
</head>
<body>

<div class="container" id="app"></div>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  const rng = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function checkAnswer(userAns, correctAns) {
  const u = userAns.trim().replace(/\s+/g, '');
  const c = correctAns.trim().replace(/\s+/g, '');
  if (u === c) return true;
  const uNum = parseFloat(u);
  const cNum = parseFloat(c);
  if (!isNaN(uNum) && !isNaN(cNum) && uNum === cNum) return true;
  const cParts = c.split(/[,;，；、]/).map(s => s.trim());
  if (cParts.length > 1) return cParts.some(part => checkAnswer(userAns.trim(), part));
  const uParts = u.split(/[,;，；、]/).map(s => s.trim());
  if (uParts.length > 1) return uParts.some(part => checkAnswer(part, correctAns.trim()));
  return false;
}

function toggleDuelReady() {
  duelIsReady = !duelIsReady;
  if (duelIsReady) { socket.emit('duelReady'); } else { socket.emit('duelUnready'); }
  renderDuelWaitingRoom();
}

function initDuelSocket() {
  if (socket) { socket.disconnect(); }

  socket = io({ transports: ['websocket', 'polling'] });

  socket.on('connect', () => {});

  socket.on('playerList', (data) => {
    players = data.players.map(p => ({
      id: p.id, name: p.name, score: p.score,
      isHost: p.isHost !== undefined ? p.isHost : (p.id === data.players[0].id)
    }));

    if (players.length >= 2) {
      const opp = players.find(p => p.id !== myPlayerId);
      if (opp) duelOpponentName = opp.name;
    }

    // Update ready status from playerList
    if (data.players[0]?.ready !== undefined) {
      data.players.forEach(p => {
        if (p.id === myPlayerId) duelIsReady = p.ready;
        else duelOpponentReady = p.ready;
      });
    }

    if (gameMode === 'duel') renderDuelWaitingRoom();
  });

  socket.on('duelReadyStatus', (data) => {
    duelOpponentReady = data.ready;
    if (gameMode === 'duel') renderDuelWaitingRoom();
  });

  socket.on('duelCountdown', () => {
    startDuelCountdown();
  });

  socket.on('duelStart', () => {
    // Server sends no data; questions come via duelRound events
    duelPlayers = players.map(p => ({ id: p.id, name: p.name }));
    duelWins = {};
    duelPlayers.forEach(p => { duelWins[p.id] = 0; });
    duelRoundIndex = 0;
    duelAnswered = false;
    duelExtraQuestions = [];
    duelCurrentQuestion = null;
  });

  socket.on('duelRound', (data) => {
    renderDuelQuestion(data);
  });

  socket.on('duelFirstWrong', (data) => {
    showFirstWrongNotice(data);
  });

  socket.on('duelRoundResult', (data) => {
    // Server sends: { roundIndex, correctAnswer, winnerId, firstAnswererId, firstAnswer, firstCorrect, wins, gameOver, void? }
    renderDuelRoundResult(data);
    if (data.gameOver) {
      // Game over will be handled by duelOver event
    }
  });

  socket.on('duelOver', (data) => {
    renderDuelGameOver(data);
  });

  socket.on('duelTimeout', () => {
    renderDuelTimeout();
  });

  socket.on('playerDisconnected', (data) => {
    if (gameMode === 'duel') {
      alert('对手离开了游戏');
      goHome();
    }
  });
}

// ============ 1v1 倒计?============
function startDuelCountdown() {
  let count = 5;
  const overlay = document.createElement('div');
  overlay.className = 'countdown-overlay';
  overlay.id = 'countdownOverlay';
  document.body.appendChild(overlay);

  function tick() {
    overlay.innerHTML = `<div class="countdown-number">${count}</div>`;
    if (count <= 0) {
      if (overlay.parentNode) overlay.remove();
      return;
    }
    count--;
    setTimeout(tick, 800);
  }
  tick();
}

// ============ 1v1 答题界面 ============
// startDuelGame removed - state managed in duelStart handler

function renderDuelQuestion(data) {
  duelAnswered = false;
  duelTimeLeft = 30;
  duelCurrentQuestion = data.question;
  duelRoundIndex = data.roundIndex;
  // Update wins from server
  if (data.wins) {
    data.wins.forEach(w => { duelWins[w.id] = w.wins; });
  }

  const myWins = duelWins[myPlayerId] || 0;
  const oppId = duelPlayers.find(p => p.id !== myPlayerId)?.id;
  const oppWins = oppId ? (duelWins[oppId] || 0) : 0;
  const myNameLocal = myName;
  const oppNameLocal = duelOpponentName;

  const winsHtml = `
    <div class="duel-wins-display">
      <div class="duel-wins-player me">
        <div class="dw-name">${escapeHtml(myNameLocal)} (你)</div>
        <div class="dw-score">${myWins}</div>
      </div>
      <div class="duel-wins-vs">VS</div>
      <div class="duel-wins-player">
        <div class="dw-name">${escapeHtml(oppNameLocal)}</div>
        <div class="dw-score">${oppWins}</div>
      </div>
    </div>`;

  const progressPercent = ((duelRoundIndex) / 15 * 100).toFixed(1);

  document.getElementById('app').innerHTML = `
    <div class="header">
      <span>${duelRoundIndex + 1}/15 道</span>
      <div class="progress-wrap"><div class="progress-bar" style="width:${progressPercent}%"></div></div>
      <span>先到8</span>
    </div>
    ${winsHtml}
    <div class="duel-timer">
      <div class="duel-timer-circle" id="duelTimer">${duelTimeLeft}</div>
    </div>
    <div class="card">
      <div class="question-num">题目 #${duelRoundIndex + 1}</div>
      <div class="question-text" style="margin-bottom:20px;">${escapeHtml(duelCurrentQuestion.q)}</div>
      <div class="input-wrap">
        <input type="text" class="answer-input" id="duelAnswerInput"
               placeholder="抢答！输入答?.." autocomplete="off" autofocus>
        <button class="btn-submit" id="duelSubmitBtn" onclick="submitDuelAnswer()">提交</button>
      </div>
      <div id="duelNotice"></div>
    </div>
    <div class="hint">按回车或点提交抢?· 30秒倒计?</div>
  `;

  const input = document.getElementById('duelAnswerInput');
  if (input) {
    input.focus();
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); if (!duelAnswered) submitDuelAnswer(); }
    });
  }

  startDuelTimer();
}

function startDuelTimer() {
  if (duelTimer) clearInterval(duelTimer);
  duelTimeLeft = 30;
  duelTimer = setInterval(() => {
    duelTimeLeft--;
    const el = document.getElementById('duelTimer');
    if (el) {
      el.textContent = duelTimeLeft;
      if (duelTimeLeft <= 10) el.classList.add('urgent');
    }
    if (duelTimeLeft <= 0) {
      clearInterval(duelTimer);
      duelTimer = null;
    }
  }, 1000);
}

function submitDuelAnswer() {
  if (duelAnswered) return;
  const input = document.getElementById('duelAnswerInput');
  if (!input) return;
  const userAnswer = input.value.trim();
  if (userAnswer === '') return;

  duelAnswered = true;
  if (duelTimer) { clearInterval(duelTimer); duelTimer = null; }

  const isCorrect = checkAnswer(userAnswer, duelCurrentQuestion.a);
  input.disabled = true;
  const submitBtn = document.getElementById('duelSubmitBtn');
  if (submitBtn) submitBtn.disabled = true;

  if (isCorrect) {
    input.classList.add('correct-input');
  } else {
    input.classList.add('wrong-input');
  }

  socket.emit('duelAnswer', {
    roundIndex: duelRoundIndex,
    answer: userAnswer,
    isCorrect,
    correctAnswer: duelCurrentQuestion.a
  });
}

function showFirstWrongNotice(data) {
  // Server sends: { playerId, answer, correctAnswer }
  // Derive names from players/duelPlayers
  const firstPlayer = players.find(p => p.id === data.playerId);
  const firstPlayerName = firstPlayer ? firstPlayer.name : '对手';
  const oppId = players.find(p => p.id !== data.playerId)?.id;
  const waitingPlayerName = oppId === myPlayerId ? '挑战者' : (duelOpponentName || '对手');

  const notice = document.getElementById('duelNotice');
  if (notice) {
    notice.innerHTML = `<div class="first-wrong-notice">
      ${escapeHtml(firstPlayerName)} 答错了！等待 ${escapeHtml(waitingPlayerName)} 作答...
    </div>`;
  }

  // Re-enable answer input if current user is the waiting player
  if (oppId === myPlayerId) {
    duelAnswered = false;
    const input = document.getElementById('duelAnswerInput');
    const btn = document.getElementById('duelSubmitBtn');
    if (input) input.disabled = false;
    if (btn) btn.disabled = false;
    if (input) input.focus();
  }
}

function renderDuelTimeout() {
  if (!duelAnswered) {
    duelAnswered = true;
    const input = document.getElementById('duelAnswerInput');
    const btn = document.getElementById('duelSubmitBtn');
    if (input) { input.disabled = true; input.classList.add('wrong-input'); }
    if (btn) btn.disabled = true;
    const notice = document.getElementById('duelNotice');
    if (notice) {
      notice.innerHTML = `<div class="first-wrong-notice">时间到！你未作答</div>`;
    }
  }
}

function renderDuelRoundResult(data) {
  if (duelTimer) { clearInterval(duelTimer); duelTimer = null; }

  // Server returns wins as array of {id, wins}
  if (data.wins && Array.isArray(data.wins)) {
    data.wins.forEach(w => { duelWins[w.id] = w.wins; });
  }

  const myWins = duelWins[myPlayerId] || 0;
  const oppId = duelPlayers.find(p => p.id !== myPlayerId)?.id;
  const oppWins = oppId ? (duelWins[oppId] || 0) : 0;

  const qText = duelCurrentQuestion ? duelCurrentQuestion.q : '';

  // Determine winner name from player list
  let winnerName = '';
  if (data.winnerId) {
    const wp = duelPlayers.find(p => p.id === data.winnerId);
    winnerName = wp ? wp.name : '对手';
  }

  let resultHtml = '';
  if (data.void) {
    resultHtml = `<div class="duel-result-void">此题作废（双方未答或均错），已补充新?</div>`;
  } else if (data.winnerId) {
    const winName = data.winnerId === myPlayerId ? '挑战者' : winnerName;
    resultHtml = `<div style="text-align:center;color:#4cd964;font-weight:700;font-size:16px;margin-bottom:12px;">
      &#x1F3C6; ${escapeHtml(winName)} 赢得此题！
    </div>`;
  }

  const winsHtml = `
    <div class="duel-wins-display">
      <div class="duel-wins-player me">
        <div class="dw-name">${escapeHtml(myName)} (你)</div>
        <div class="dw-score">${myWins}</div>
      </div>
      <div class="duel-wins-vs">VS</div>
      <div class="duel-wins-player">
        <div class="dw-name">${escapeHtml(duelOpponentName)}</div>
        <div class="dw-score">${oppWins}</div>
      </div>
    </div>`;

  document.getElementById('app').innerHTML = `
    <div class="header">
      <span>${data.roundIndex + 1} 题</span>
      <div class="progress-wrap"><div class="progress-bar" style="width:${((data.roundIndex + 1) / 15 * 100).toFixed(1)}%"></div></div>
      <span>先到8</span>
    </div>
    ${winsHtml}
    <div class="card">
      <div class="question-num">题目 #${data.roundIndex + 1} · 本轮结果</div>
      <div class="question-text" style="font-size:16px;margin-bottom:16px;">${escapeHtml(qText)}</div>
      <div style="color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:12px;">
        正确答案</span style="color:#ffd200;">${escapeHtml(data.correctAnswer)}</span>
      </div>
      ${resultHtml}
      ${data.gameOver ? '' : '<button class="btn btn-next" onclick="duelNextRound()">下一题 &rarr;</button>'}
    </div>
    <div class="hint">${data.gameOver ? '比赛结束' : '2秒后自动进入下一题'}</div>
  `;

  if (!data.gameOver) {
    autoAdvanceTimer = setTimeout(() => { duelNextRound(); }, 2000);
  }
}

  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);

          const label = r.winnerId === myPlayerId ? '你' : (r.winnerId ? '挑战者' : '作废');
          return `<div style="padding:6px 8px;margin-bottom:4px;background:rgba(255,255,255,0.03);border-radius:6px;font-size:12px;display:flex;justify-content:space-between;">
            <span style="color:rgba(255,255,255,0.4);">R${i+1}</span>
            <span style="flex:1;margin:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(255,255,255,0.6);">${escapeHtml(r.questionText || '')}</span>
            <span style="font-weight:600;color:${r.winnerId === myPlayerId ? '#4cd964' : (r.winnerId ? '#ff453a' : 'rgba(255,255,255,0.3)')};">${icon} ${label}</span>
          </div>`;
        }).join('')}
      </div>

      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px;">
        <button class="btn btn-restart" onclick="${iWon ? 'goHome()' : 'goHome()'}">${iWon ? '返回首页' : '再来一局'}</button>
        <button class="btn btn-restart" onclick="goHome()" style="background:rgba(255,255,255,0.12);">返回首页</button>
      </div>
    </div>`;
}


// ============ 单人模式 ============
function goSoloSelect() {
  gameMode = 'solo'; isHost = false;
  if (socket) { socket.disconnect(); socket = null; }
  renderSoloSelectScreen();
}

function renderSoloSelectScreen() {
  const total = ALL_QUESTIONS.length;
  const options = [
    { count: 10, label: '10 道' }, { count: 20, label: '20 道' },
    { count: 50, label: '50 道' }, { count: 100, label: '100 道' },
    { count: 200, label: '200 道' },
    { count: total, label: '全部 (' + total + ' ?', all: true },
  ];

  let optionHtml = options.map(opt => {
    return `<button class="btn-option${opt.all ? ' all-btn' : ''}" onclick="startSoloQuiz(${opt.count})">
      <span class="count-num">${opt.all ? 'ALL' : opt.count}</span>
      <span class="count-label">${opt.label}</span></button>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="card select-card">
      <div class="logo">&#x2753;</div>
      <div class="title">趣味答题挑战</div>
      <div class="subtitle">填空题模式，检验你的知识储?</div>
      <div class="total-info">题库?<strong>${total}</strong> 道填空题</div>
      <div class="option-grid">${optionHtml}</div>
      <button class="btn btn-restart" onclick="goHome()" style="background:rgba(255,255,255,0.12);margin-top:16px;">返回</button>
    </div>`;
}

function startSoloQuiz(count) {
  totalQuestions = Math.min(count, ALL_QUESTIONS.length);
  questions = shuffle(ALL_QUESTIONS).slice(0, totalQuestions);
  currentIndex = 0; score = 0; wrongList = []; answered = false;
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  renderSoloQuestion();
}

function renderSoloQuestion() {
  if (currentIndex >= questions.length) { renderSoloResult(); return; }
  const q = questions[currentIndex];
  const progress = ((currentIndex) / questions.length * 100).toFixed(1);

  document.getElementById('app').innerHTML = `
    <div class="header">
      <span>${currentIndex + 1}/${questions.length} </span>
      <div class="progress-wrap"><div class="progress-bar" style="width:${progress}%"></div></div>
      <span>得分: ${score}</span>
    </div>
    <div class="card">
      <div class="question-num">题目 #${currentIndex + 1}</div>
      <div class="question-text">${escapeHtml(q.q)}</div>
      <div class="input-wrap">
        <input type="text" class="answer-input" id="answerInput" placeholder="输入你的答案..." autocomplete="off" autofocus>
        <button class="btn-submit" id="submitBtn" onclick="soloSubmit()">提交</button>
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="btn btn-next" id="nextBtn" disabled onclick="soloNext()">下一题 &rarr;</button>
    </div>
    <div class="hint">输入答案后按回车或点提交</div>
  `;
  answered = false;
  const input = document.getElementById('answerInput');
  if (input) {
    input.focus();
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); if (!answered) soloSubmit(); else soloNext(); }
    });
  }
}

function soloSubmit() {
  if (answered) return;
  const input = document.getElementById('answerInput');
  if (!input) return;
  const ua = input.value.trim(); if (ua === '') return;
  answered = true;
  const q = questions[currentIndex];
  const isCorrect = checkAnswer(ua, q.a);
  input.disabled = true;
  input.classList.add(isCorrect ? 'correct-input' : 'wrong-input');
  document.getElementById('submitBtn').disabled = true;
  const fb = document.getElementById('feedback');
  if (isCorrect) { score++; fb.className = 'feedback correct-msg show'; fb.innerHTML = '✅ 回答正确'; }
  else {
    fb.className = 'feedback wrong-msg show';
    fb.innerHTML = '❌ 回答错误<div class="correct-answer">正确答案' + escapeHtml(q.a) + '</div>';
    wrongList.push({ q: q.q, a: q.a, ua });
  }
  document.querySelector('.header span:last-child').textContent = '得分: ' + score;
  document.getElementById('nextBtn').disabled = false;
  autoAdvanceTimer = setTimeout(() => soloNext(), 2000);
}

function soloNext() {
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  currentIndex++;
  currentIndex >= questions.length ? renderSoloResult() : renderSoloQuestion();
}

function renderSoloResult() {
  const total = questions.length;
  const percent = Math.round((score / total) * 100);
  const wrongCount = wrongList.length;
  let grade = '', gc = '';
  if (percent >= 90) { grade = '优秀'; gc = '#ffd200'; }
  else if (percent >= 75) { grade = '良好'; gc = '#4cd964'; }
  else if (percent >= 60) { grade = '及格'; gc = '#ff9500'; }
  else { grade = '继续努力'; gc = '#ff453a'; }

  let wh = wrongList.length > 0 ? `<div style="margin-top:24px;text-align:left;">
    <div style="color:rgba(255,255,255,0.6);font-size:14px;margin-bottom:12px;">错题回顾?</div>
    <div style="max-height:300px;overflow-y:auto;padding-right:8px;">
      ${wrongList.map((w,i) => `<div style="background:rgba(255,69,58,0.08);border:1px solid rgba(255,69,58,0.2);border-radius:10px;padding:12px 14px;margin-bottom:8px;font-size:14px;">
        <div style="color:#fff;margin-bottom:4px;">${i+1}. ${escapeHtml(w.q)}</div>
        <div style="color:#ff453a;">你的答案?{escapeHtml(w.ua)}</div>
        <div style="color:#ffd200;">正确答案?{escapeHtml(w.a)}</div></div>`).join('')}
    </div></div>` : '';

  document.getElementById('app').innerHTML = `
    <div class="card result-card">
      <div class="score-label">答题完成</div>
      <div class="score-circle" style="--percent:${(score/total*360).toFixed(0)}deg"><div class="score-num">${score}</div></div>
      <div style="font-size:22px;font-weight:700;color:${gc};margin-bottom:8px;">${grade}</div>
      <div style="color:rgba(255,255,255,0.5);font-size:14px;">${total} 题，正确${percent}%</div>
      <div class="result-stats">
        <div class="stat"><div class="stat-val green">${score}</div><div class="stat-lbl">答对</div></div>
        <div class="stat"><div class="stat-val red">${wrongCount}</div><div class="stat-lbl">答错</div></div>
        <div class="stat"><div class="stat-val rate">${percent}%</div><div class="stat-lbl">正确数</div></div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-restart" onclick="startSoloQuiz(${totalQuestions})">再来一氧化碳?</button>
        <button class="btn btn-restart" onclick="goHome()" style="background:rgba(255,255,255,0.12);">返回首页</button>
      </div>
      ${wh}
    </div>`;
}

// ============ 通用 ============
function goHome() {
  if (socket) { socket.disconnect(); socket = null; }
  gameMode = 'solo'; roomCode = ''; myPlayerId = 0; myName = ''; players = [];
  isHost = false; score = 0; answered = false; gameEnded = false;
  roundResults = []; wrongList = [];
  duelWins = {}; duelIsReady = false; duelOpponentReady = false;
  duelAnswered = false; duelExtraQuestions = []; duelCurrentQuestion = null;
  duelRoundIndex = 0; duelPlayers = []; duelOpponentName = '';
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  if (duelTimer) clearInterval(duelTimer);
  renderHome();
}

renderHome();
</script>
</body>
</html>
