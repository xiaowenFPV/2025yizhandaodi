<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>趣味答题挑战</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 640px;
}

/* 顶部信息栏 */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  color: rgba(255,255,255,0.8);
  font-size: 14px;
}

.progress-wrap {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.15);
  border-radius: 3px;
  margin: 0 16px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #f7971e, #ffd200);
  border-radius: 3px;
  transition: width 0.4s ease;
}

/* 题目卡片 */
.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 32px 28px;
  transition: all 0.3s ease;
}

.question-num {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.question-text {
  font-size: 20px;
  color: #fff;
  line-height: 1.7;
  margin-bottom: 28px;
  font-weight: 500;
}

/* 选项区 */
.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}

.option-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  font-size: 16px;
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  color: #fff;
  cursor: pointer;
  transition: all 0.25s;
  text-align: left;
  width: 100%;
}

.option-btn:hover {
  border-color: rgba(255,210,0,0.5);
  background: rgba(255,210,0,0.08);
  transform: translateX(4px);
}

.option-btn:disabled {
  cursor: not-allowed;
}

.option-btn .opt-letter {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
  transition: all 0.25s;
}

.option-btn.selected {
  border-color: #ffd200;
  background: rgba(255,210,0,0.12);
}

.option-btn.selected .opt-letter {
  background: #ffd200;
  color: #1a1a2e;
}

.option-btn.correct-answer {
  border-color: rgba(76,217,100,0.6);
  background: rgba(76,217,100,0.12);
}

.option-btn.correct-answer .opt-letter {
  background: #4cd964;
  color: #fff;
}

.option-btn.wrong-answer {
  border-color: rgba(255,69,58,0.5);
  background: rgba(255,69,58,0.08);
}

.option-btn.wrong-answer .opt-letter {
  background: #ff453a;
  color: #fff;
}

/* 反馈区 */
.feedback {
  padding: 14px 18px;
  border-radius: 12px;
  font-size: 15px;
  display: none;
  animation: fadeIn 0.3s ease;
  margin-bottom: 16px;
}

.feedback.show { display: block; }

.feedback.correct-msg {
  background: rgba(76,217,100,0.15);
  color: #4cd964;
  border: 1px solid rgba(76,217,100,0.3);
}

.feedback.wrong-msg {
  background: rgba(255,69,58,0.15);
  color: #ff453a;
  border: 1px solid rgba(255,69,58,0.3);
}

.feedback .correct-answer {
  color: #ffd200;
  font-weight: 600;
  margin-top: 4px;
}

/* 按钮 */
.btn {
  padding: 14px 28px;
  font-size: 16px;
  font-weight: 600;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s;
  white-space: nowrap;
}

.btn-next {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #1a1a2e;
  width: 100%;
}

.btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(247,151,30,0.4); }
.btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-restart {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  padding: 16px 40px;
  font-size: 17px;
}

.btn-restart:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(102,126,234,0.5); }

/* 结果页 */
.result-card {
  text-align: center;
}

.result-card .score-circle {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: conic-gradient(#ffd200 var(--percent), rgba(255,255,255,0.1) var(--percent));
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  position: relative;
}

.result-card .score-circle::before {
  content: '';
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: #1a1a3e;
  position: absolute;
}

.result-card .score-num {
  font-size: 36px;
  font-weight: 700;
  color: #ffd200;
  z-index: 1;
}

.result-card .score-label {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 8px;
}

.result-stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin: 20px 0 28px;
}

.result-stats .stat {
  text-align: center;
}

.result-stats .stat-val {
  font-size: 28px;
  font-weight: 700;
  color: #fff;
}

.result-stats .stat-val.green { color: #4cd964; }
.result-stats .stat-val.red { color: #ff453a; }
.result-stats .stat-val.rate { color: #ffd200; }

.result-stats .stat-lbl {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  margin-top: 4px;
}

/* 快捷键提示 */
.hint {
  text-align: center;
  color: rgba(255,255,255,0.35);
  font-size: 13px;
  margin-top: 16px;
}

/* 选择界面 */
.select-card {
  text-align: center;
}

.select-card .logo {
  font-size: 48px;
  margin-bottom: 8px;
}

.select-card .title {
  font-size: 26px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 6px;
}

.select-card .subtitle {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 32px;
}

.select-card .total-info {
  font-size: 14px;
  color: rgba(255,255,255,0.45);
  margin-bottom: 24px;
  padding: 12px 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  display: inline-block;
}

.select-card .total-info strong {
  color: #ffd200;
}

.option-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}

.btn-option {
  padding: 18px 12px;
  font-size: 17px;
  font-weight: 600;
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  background: rgba(255,255,255,0.06);
  color: #fff;
  cursor: pointer;
  transition: all 0.25s;
}

.btn-option:hover {
  border-color: #ffd200;
  background: rgba(255,210,0,0.1);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255,210,0,0.2);
}

.btn-option.all-btn {
  grid-column: 2 / 3;
}

.btn-option .count-num {
  display: block;
  font-size: 26px;
  color: #ffd200;
  margin-bottom: 2px;
}

.btn-option .count-label {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-6px); }
  75%     { transform: translateX(6px); }
}

.shake { animation: shake 0.4s ease; }

/* 移动端 */
@media (max-width: 480px) {
  .card { padding: 24px 18px; }
  .question-text { font-size: 17px; }
  .option-btn { padding: 12px 14px; font-size: 15px; }
  .result-stats { gap: 20px; }
  .option-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .btn-option.all-btn { grid-column: auto; }
  .btn-option { padding: 14px 10px; }
}
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
const ALL_QUESTIONS = [{"q": "“大珠小珠落玉盘”形容的是哪种乐器演奏的乐声？", "options": ["上下结构", "书法", "琵琶", "京剧"], "correct": "C", "correct_idx": 2}, {"q": "哪位音乐家的音乐被誉为“花丛中的大炮”？", "options": ["郑成功", "苏轼", "汪伦", "肖邦"], "correct": "D", "correct_idx": 3}, {"q": "我们常在影视剧中听到呼喊“号外号外”的小孩是在兜售什么？", "options": ["肖邦", "卫青", "报纸", "琵琶"], "correct": "C", "correct_idx": 2}, {"q": "以下哪个科室属于医院中的五官科？", "options": ["京口", "报纸", "口腔科", "曾任楚国令尹"], "correct": "C", "correct_idx": 2}, {"q": "诗句“桃花潭水深千尺”，原诗中比水更深的是谁的情谊？", "options": ["汪伦", "蔡伦", "寇准", "郑成功"], "correct": "A", "correct_idx": 0}, {"q": "下面哪位词人的出生地不在山东地区？", "options": ["苏东坡", "苏轼", "苏秦", "肖邦"], "correct": "B", "correct_idx": 1}, {"q": "以下哪条对屈原的描述是不正确的？", "options": ["曾任楚国令尹", "六国论", "英国", "少年中国说"], "correct": "A", "correct_idx": 0}, {"q": "“溜须拍马”中的“溜须”典故与哪位历史人物有关？", "options": ["郑成功", "高原", "肖邦", "寇准"], "correct": "D", "correct_idx": 3}, {"q": "哪位汉初勇将与刘邦是连襟关系？", "options": ["高原", "樊哙", "张骞", "孟子"], "correct": "B", "correct_idx": 1}, {"q": "秦汉时期，逐渐取代青铜而被广泛使用的是哪种金属？", "options": ["碳酸钙", "铁", "锌", "钠"], "correct": "B", "correct_idx": 1}, {"q": "古代文学作品中通常用哪种乔木类果实来象征相思？", "options": ["红豆", "琵琶", "红绿蓝", "红色"], "correct": "A", "correct_idx": 0}, {"q": "“五十步笑百步”这个典故出自哪部先秦典籍？", "options": ["孟子", "肖邦", "丰子恺", "孔子"], "correct": "A", "correct_idx": 0}, {"q": "汉武帝同胞姐姐平阳公主嫁给了哪位抗匈名将并在身后与之合葬？", "options": ["汪伦", "卫青", "贺知章", "陆游"], "correct": "B", "correct_idx": 1}, {"q": "世界哲学的三大发源地是指古代中国、古代希腊和哪个古代国家？", "options": ["北纬三十度", "印度", "琵琶", "肖邦"], "correct": "B", "correct_idx": 1}, {"q": "赤壁之战中，哪位吴国将领假装投降以接近曹军发动火攻？", "options": ["黄河", "黄海", "黄盖", "黄土高原"], "correct": "C", "correct_idx": 2}, {"q": "中国台湾省台南市的延平郡王祠祭祀的是哪一位明末人物？", "options": ["郑成功", "肖邦", "寇准", "孟子"], "correct": "A", "correct_idx": 0}, {"q": "宋代之前常说的“周孔之教”指的是哪个学派？", "options": ["儒家", "儒林外史", "曾任楚国令尹", "口腔科"], "correct": "A", "correct_idx": 0}, {"q": "哪部著名的法国儿童文学作品中的主人公来自于B-612号小行星？", "options": ["小王子", "陈子昂", "金蝉子", "王维"], "correct": "A", "correct_idx": 0}, {"q": "源于《列女传》中的东海孝妇故事被关汉卿改编成了哪部著名剧目？", "options": let wrongList = [];
let answered = false;
let selectedOption = -1;
let totalQuestions = 0;
let autoAdvanceTimer = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(count) {
  totalQuestions = Math.min(count, ALL_QUESTIONS.length);
  questions = shuffle(ALL_QUESTIONS).slice(0, totalQuestions);
  currentIndex = 0;
  score = 0;
  wrongList = [];
  answered = false;
  selectedOption = -1;
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  renderQuestion();
}

function renderQuestion() {
  if (currentIndex >= questions.length) {
    renderResult();
    return;
  }

  const q = questions[currentIndex];
  const progress = ((currentIndex) / questions.length * 100).toFixed(1);
  const letters = ['A', 'B', 'C', 'D'];

  let optionsHtml = q.options.map((opt, i) => {
    return '<button class="option-btn" data-idx="' + i + '" onclick="selectOption(' + i + ')">' +
      '<span class="opt-letter">' + letters[i] + '</span>' +
      '<span>' + escapeHtml(opt) + '</span>' +
    '</button>';
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="header">
      <span>第 ${currentIndex + 1}/${questions.length} 题</span>
      <div class="progress-wrap">
        <div class="progress-bar" style="width:${progress}%"></div>
      </div>
      <span>得分: ${score}</span>
    </div>
    <div class="card" id="qcard">
      <div class="question-num">题目 #${currentIndex + 1}</div>
      <div class="question-text">${escapeHtml(q.q)}</div>
      <div class="options-list" id="optionsList">
        ${optionsHtml}
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="btn btn-next" id="nextBtn" disabled onclick="nextQuestion()">下一题 →</button>
    </div>
    <div class="hint">点击选项或按 A / B / C / D 键选择</div>
  `;

  answered = false;
  selectedOption = -1;

  // Keyboard shortcuts
  document.addEventListener('keydown', handleKeydown);
}

function handleKeydown(e) {
  if (answered) return;
  const key = e.key.toUpperCase();
  const keyMap = { 'A': 0, 'B': 1, 'C': 2, 'D': 3 };
  if (key in keyMap) {
    selectOption(keyMap[key]);
  }
}

function selectOption(idx) {
  if (answered) return;

  // Visual selection
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.classList.remove('selected'));
  const btn = document.querySelector('.option-btn[data-idx="' + idx + '"]');
  if (btn) btn.classList.add('selected');

  selectedOption = idx;

  // Enable next button
  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn) {
    nextBtn.disabled = false;
    nextBtn.textContent = '确认答案';
    nextBtn.onclick = submitAnswer;
  }
}

function submitAnswer() {
  if (answered || selectedOption < 0) return;
  answered = true;

  const q = questions[currentIndex];
  const isCorrect = (selectedOption === q.correct_idx);

  // Disable all buttons
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);

  // Highlight correct answer
  const correctBtn = document.querySelector('.option-btn[data-idx="' + q.correct_idx + '"]');
  if (correctBtn) correctBtn.classList.add('correct-answer');

  // Highlight wrong selection
  if (!isCorrect) {
    const wrongBtn = document.querySelector('.option-btn[data-idx="' + selectedOption + '"]');
    if (wrongBtn) wrongBtn.classList.add('wrong-answer');
  }

  // Feedback
  const feedback = document.getElementById('feedback');
  if (isCorrect) {
    score++;
    feedback.className = 'feedback correct-msg show';
    feedback.innerHTML = '✓ 回答正确！';
  } else {
    feedback.className = 'feedback wrong-msg show';
    feedback.innerHTML = '✗ 回答错误<div class="correct-answer">正确答案：' + escapeHtml(q.options[q.correct_idx]) + '</div>';
    wrongList.push({
      q: q.q,
      a: q.options[q.correct_idx],
      ua: q.options[selectedOption]
    });
  }

  // Update header score
  const header = document.querySelector('.header span:last-child');
  if (header) header.textContent = '得分: ' + score;

  // Update next button
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = '下一题 →';
  nextBtn.disabled = false;
  nextBtn.onclick = nextQuestion;

  // Remove keyboard handler
  document.removeEventListener('keydown', handleKeydown);

  // Auto advance
  autoAdvanceTimer = setTimeout(() => {
    nextQuestion();
  }, 2000);
}

function nextQuestion() {
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  currentIndex++;
  if (currentIndex >= questions.length) {
    renderResult();
  } else {
    renderQuestion();
  }
}

function renderResult() {
  document.removeEventListener('keydown', handleKeydown);
  const total = questions.length;
  const percent = Math.round((score / total) * 100);
  const wrongCount = wrongList.length;

  let grade = '';
  let gradeColor = '';
  if (percent >= 90) { grade = '优秀'; gradeColor = '#ffd200'; }
  else if (percent >= 75) { grade = '良好'; gradeColor = '#4cd964'; }
  else if (percent >= 60) { grade = '及格'; gradeColor = '#ff9500'; }
  else { grade = '继续努力'; gradeColor = '#ff453a'; }

  let wrongHtml = '';
  if (wrongList.length > 0) {
    wrongHtml = `
      <div style="margin-top:24px; text-align:left;">
        <div style="color:rgba(255,255,255,0.6); font-size:14px; margin-bottom:12px;">错题回顾：</div>
        <div style="max-height:300px; overflow-y:auto; padding-right:8px;">
          ${wrongList.map((w, i) => `
            <div style="background:rgba(255,69,58,0.08); border:1px solid rgba(255,69,58,0.2); border-radius:10px; padding:12px 14px; margin-bottom:8px; font-size:14px;">
              <div style="color:#fff; margin-bottom:4px;">${i+1}. ${escapeHtml(w.q)}</div>
              <div style="color:#ff453a;">你的答案：${escapeHtml(w.ua)}</div>
              <div style="color:#ffd200;">正确答案：${escapeHtml(w.a)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  document.getElementById('app').innerHTML = `
    <div class="card result-card">
      <div class="score-label">答题完成</div>
      <div class="score-circle" style="--percent:${(score/total*360).toFixed(0)}deg">
        <div class="score-num">${score}</div>
      </div>
      <div style="font-size:22px; font-weight:700; color:${gradeColor}; margin-bottom:8px;">${grade}</div>
      <div style="color:rgba(255,255,255,0.5); font-size:14px;">共 ${total} 题，正确率 ${percent}%</div>
      <div class="result-stats">
        <div class="stat">
          <div class="stat-val green">${score}</div>
          <div class="stat-lbl">答对</div>
        </div>
        <div class="stat">
          <div class="stat-val red">${wrongCount}</div>
          <div class="stat-lbl">答错</div>
        </div>
        <div class="stat">
          <div class="stat-val rate">${percent}%</div>
          <div class="stat-lbl">正确率</div>
        </div>
      </div>
      <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
        <button class="btn btn-restart" onclick="startQuiz(${totalQuestions})">再来一轮</button>
        <button class="btn btn-restart" onclick="renderSelectScreen()" style="background:rgba(255,255,255,0.12);">重新选题</button>
      </div>
      ${wrongHtml}
    </div>
  `;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderSelectScreen() {
  const total = ALL_QUESTIONS.length;
  const options = [
    { count: 10, label: '10 题' },
    { count: 20, label: '20 题' },
    { count: 50, label: '50 题' },
    { count: 100, label: '100 题' },
    { count: 200, label: '200 题' },
    { count: total, label: '全部 (' + total + ' 题)', all: true },
  ];

  let optionHtml = options.map((opt) => {
    if (opt.all) {
      return '<button class="btn-option all-btn" onclick="startQuiz(' + opt.count + ')">' +
        '<span class="count-num">ALL</span>' +
        '<span class="count-label">' + opt.label + '</span>' +
      '</button>';
    }
    return '<button class="btn-option" onclick="startQuiz(' + opt.count + ')">' +
      '<span class="count-num">' + opt.count + '</span>' +
      '<span class="count-label">' + opt.label + '</span>' +
    '</button>';
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="card select-card">
      <div class="logo">&#x2753;</div>
      <div class="title">趣味答题挑战</div>
      <div class="subtitle">四选一选择题，检验你的知识储备</div>
      <div class="total-info">题库共 <strong>${total}</strong> 道选择题</div>
      <div class="option-grid">${optionHtml}</div>
      <div style="color:rgba(255,255,255,0.3); font-size:13px;">选择题目数量后开始答题</div>
    </div>
  `;
}

// Start
renderSelectScreen();
</script>
</body>
</html>
